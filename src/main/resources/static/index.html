<script>

    // Logout Function
    function logout(){

        // Remove user session
        localStorage.removeItem("loggedInUser");
        localStorage.removeItem("userId");

        // Optional: clear page-specific data
        // localStorage.removeItem("history");

        alert("Logged Out Successfully!");

        window.location.href = "login.html";
    }

</script>

<script>
    function toggleAccountMenu() {

        document
            .getElementById("accountDropdown")
            .classList.toggle("show");

    }

    document.addEventListener("click", function(e){

        const menu = document.querySelector(".account-menu");

        if(!menu.contains(e.target)){

            document
                .getElementById("accountDropdown")
                .classList.remove("show");

        }

    });

    // ===============================
    // Logged-in User
    // ===============================

    const loggedInUser = JSON.parse(localStorage.getItem("loggedInUser"));

    // Show Welcome Message
    window.onload = function(){

        if(loggedInUser){

            const welcomeUser = document.getElementById("welcomeUser");

            if(welcomeUser){

                welcomeUser.innerHTML =
                    "&#128075; Welcome, " + loggedInUser.fullName;

            }

        }

        // Apply Theme
        const theme = localStorage.getItem("theme");

        if(theme === "dark"){

            document.body.classList.add("dark-mode");

        }

    };

</script>

    function searchBrands() {

        let filter = document.getElementById("searchInput").value.toUpperCase();

        let brands = document.querySelectorAll(".brand-box");

        brands.forEach(function(brand){

            let name = brand.querySelector("h3");

            if(!name) return;

            if(name.textContent.toUpperCase().includes(filter)){
                brand.style.display = "";
            } else {
                brand.style.display = "none";
            }

        });
    }



    const brands = [
        "Apple", "Samsung", "Google", "Motorola", "Xiaomi",
        "Realme", "Vivo", "Oppo", "Dell", "HP", "Lenovo",
        "Noise", "boAt", "JBL",
        "American Tourister", "Skybags", "Safari",
        "Wildcraft", "TUMI", "VIP", "Samsonite",
        "Osprey", "Coleman", "Decathlon"
    ];

    const searchInput = document.getElementById("searchInput");
    const suggestions = document.getElementById("suggestions");

    searchInput.addEventListener("input", function() {
        const value = this.value.toLowerCase();
        suggestions.innerHTML = "";

        if (value === "") return;

        const filtered = brands.filter(brand =>
            brand.toLowerCase().includes(value)
        );

        filtered.forEach(brand => {
            const div = document.createElement("div");
            div.classList.add("suggestion-item");
            div.textContent = brand;

            div.onclick = () => {
                searchInput.value = brand;
                suggestions.innerHTML = "";
            };

            suggestions.appendChild(div);
        });
    });

</script>

<script>

    function changeLanguage(lang){

        if(!translations[lang]) return;

        localStorage.setItem("language", lang);

        function setText(id, text){

            const element = document.getElementById(id);

            if(element){

                element.innerHTML = text;

            }

        }

        setText("accountBtn", translations[lang].account);
        setText("searchBtn", translations[lang].search);

        setText("loginText", translations[lang].login);
        setText("signupText", translations[lang].signup);
        setText("profileText", translations[lang].profile);
        setText("favoritesText", translations[lang].favorites);
        setText("historyText", translations[lang].history);
        setText("settingsText", translations[lang].settings);
        setText("helpText", translations[lang].help);
        setText("aboutText", translations[lang].about);
        setText("logoutText", translations[lang].logout);

        setText("fashion", translations[lang].fashion);
        setText("footwear", translations[lang].footwear);
        setText("electronics", translations[lang].electronics);
        setText("beauty", translations[lang].beauty);
        setText("accessories", translations[lang].accessories);
        setText("sports", translations[lang].sports);
        setText("home", translations[lang].home);
        setText("travel", translations[lang].travel);


    }

    window.addEventListener("load", function(){

        const savedLanguage =
            localStorage.getItem("language") || "English";

        changeLanguage(savedLanguage);

    });

</script>
