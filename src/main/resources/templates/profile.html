<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - BrandVerse</title>

    <link rel="stylesheet" href="../static/style.css">

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>
<body>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<div class="profile-container">

    <div class="profile-header">

        <div class="profile-avatar">
            <i class="fas fa-user"></i>
        </div>

        <h1 id="profileName"></h1>

        <p id="profileEmail"></p>

        <span class="member-date" id="memberSince"></span>

    </div>

    <div class="profile-card">

        <h2><i class="fas fa-id-card"></i> Account Information</h2>

        <div class="info-row">
            <span>Name</span>
            <span id="accountName"></span>
        </div>

        <div class="info-row">
            <span>Email</span>
            <span id="accountEmail"></span>
        </div>

        <div class="info-row">
            <span>User ID</span>
            <span id="userId"></span>
        </div>

        <div class="profile-card">

            <h2><i class="fas fa-chart-line"></i> Account Statistics</h2>

            <div class="stats">

                <!-- Favorites -->
                <div class="stat-box"
                     onclick="window.location.href='favorites.html'"
                     style="cursor:pointer;">

                    <i class="fas fa-heart"></i>

                    <h3 id="favoriteCount">0</h3>

                    <p>Favorites</p>

                </div>

                <!-- History -->
                <div class="stat-box"
                     onclick="window.location.href='history.html'"
                     style="cursor:pointer;">

                    <i class="fas fa-clock-rotate-left"></i>

                    <h3 id="historyCount">0</h3>

                    <p>History</p>

                </div>

                <!-- Categories -->
                <div class="stat-box"
                     onclick="window.location.href='index.html'"
                     style="cursor:pointer;">

                    <i class="fas fa-layer-group"></i>

                    <h3 id="categoryCount">8</h3>

                    <p>Categories</p>

                </div>

            </div>

        </div>

        <div class="profile-card">

            <h2><i class="fas fa-bolt"></i> Quick Actions</h2>

            <div class="quick-links">

                <a href="favorites.html">
                    <i class="fas fa-heart"></i> Favorites
                </a>

                <a href="history.html">
                    <i class="fas fa-clock-rotate-left"></i> History
                </a>

                <a href="settings.html">
                    <i class="fas fa-gear"></i> Settings
                </a>

                <a href="help.html">
                    <i class="fas fa-headset"></i> Help
                </a>

                <a href="about.html">
                    <i class="fas fa-circle-info"></i> About
                </a>

            </div>

        </div>

        <div class="profile-card"></div>

            <h2><i class="fas fa-user-shield"></i> Account</h2>

            <div class="info-row">
                <span>Last Login</span>
                <span>30 June 2026</span>
            </div>

        </div>

        <a href="index.html" class="home-btn">
            <i class="fas fa-home"></i> Back to Home
        </a>

    </div>



    <script>

        const user = JSON.parse(localStorage.getItem("loggedInUser"));

        if(user){

            document.getElementById("profileName").innerText = user.fullName;

            document.getElementById("profileEmail").innerText = user.email;

            document.getElementById("accountName").innerText = user.fullName;

            document.getElementById("accountEmail").innerText = user.email;

            document.getElementById("userId").innerText = user.id;

            if(user.createdAt){

                const date = new Date(user.createdAt);

                document.getElementById("memberSince").innerText =
                    "Member Since : " + date.toLocaleDateString();

            }else{

                document.getElementById("memberSince").innerText =
                    "Member Since : Today";

            }

        }else{

            alert("Please Login First!");

            window.location.href = "login.html";

        }

    </script>

    <script>


        const userId = user.id;

        // ===============================
        // Load Favorites Count from MySQL
        // ===============================
        fetch("http://localhost:8080/api/favorites/" + userId)
            .then(response => response.json())
            .then(data => {
                document.getElementById("favoriteCount").innerText = data.length;
            })
            .catch(error => console.error(error));

        // ===============================
        // Load History Count from MySQL
        // ===============================
        fetch("http://localhost:8080/api/history/" + userId)
            .then(response => response.json())
            .then(data => {
                document.getElementById("historyCount").innerText = data.length;
            })
            .catch(error => console.error(error));

        // Total Categories
        document.getElementById("categoryCount").innerText = 8;

    </script>

</body>
</html>
